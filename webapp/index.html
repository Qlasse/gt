<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GymTracker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- Экран: главная -->
    <section id="screen-home" class="screen">
      <header class="home-header">
        <h1>Тренировки</h1>
        <div class="header-actions">
          <button id="btn-settings" class="btn-icon" aria-label="Настройки">
            <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M4 7h8M19 7h1M4 17h1M12 17h8"/><circle cx="15.5" cy="7" r="2.5"/><circle cx="8.5" cy="17" r="2.5"/>
            </svg>
          </button>
          <button id="btn-add" class="btn-icon" aria-label="Добавить упражнение">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </header>
      <div id="home-list">
        <div id="home-sections"></div>
        <div id="home-empty" class="empty-state" hidden>
          <p>Пока нет упражнений.</p>
          <p class="hint">Нажмите «+», чтобы добавить первое.</p>
        </div>
      </div>
      <div class="credit">made by q for fam</div>
    </section>

    <!-- Экран: упражнение -->
    <section id="screen-exercise" class="screen right">
      <header class="topbar">
        <button class="btn-icon btn-back" aria-label="Назад">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
        <h1 id="ex-title" class="topbar-title"></h1>
        <button id="btn-fav" class="btn-icon btn-star" aria-label="В избранное">
          <svg viewBox="0 0 24 24" width="22" height="22"><path class="star-path" d="M12 3.5l2.47 5.32 5.83.66-4.32 3.97 1.16 5.75L12 16.3l-5.14 2.9 1.16-5.75-4.32-3.97 5.83-.66z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" fill="none"/></svg>
        </button>
        <button id="btn-menu" class="btn-icon" aria-label="Действия с упражнением">
          <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="5" cy="12" r="2" fill="currentColor"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="19" cy="12" r="2" fill="currentColor"/></svg>
        </button>
      </header>

      <div class="ex-body">
        <div class="viz-wrap">
          <svg id="viz" xmlns="http://www.w3.org/2000/svg"></svg>
          <div id="viz-note" class="viz-note"></div>
        </div>

        <div class="weight-block">
          <div id="weight-scrub" class="weight-display" title="Тап — ввод, свайп — подбор">
            <span id="weight-value">60</span><span class="weight-unit">кг</span>
            <input id="weight-input" class="weight-input" type="number" inputmode="decimal" enterkeyhint="done" hidden>
          </div>
          <div class="scrub-hint">тяните число вбок · шаг 2,5 кг</div>
        </div>

        <div class="stepper">
          <button id="btn-minus" class="stepper-btn" aria-label="Меньше">−</button>
          <button id="btn-plus" class="stepper-btn" aria-label="Больше">+</button>
        </div>
        <button id="btn-reset-weight" class="btn-ghost-sm">Сбросить вес</button>

        <div class="sets-row">
          <label class="sets-field">
            <input id="inp-sets" type="number" inputmode="numeric" enterkeyhint="done" min="1" max="20" placeholder="—">
            <span>подходы</span>
          </label>
          <span class="sets-x">×</span>
          <label class="sets-field">
            <input id="inp-reps" type="number" inputmode="numeric" enterkeyhint="done" min="1" max="100" placeholder="—">
            <span>повторы</span>
          </label>
        </div>

        <div class="timer-row" role="group" aria-label="Таймер отдыха">
          <button id="timer-minus" class="timer-side" aria-label="Минус 30 секунд">−30</button>
          <button id="timer-main" aria-label="Таймер отдыха">
            <span id="timer-fill" class="timer-fill"></span>
            <span id="timer-label">⏱ 2:00</span>
          </button>
          <button id="timer-plus" class="timer-side" aria-label="Плюс 30 секунд">+30</button>
        </div>

        <button id="btn-record" class="btn-primary">Записать</button>

        <div id="progress-block" class="progress-block" hidden>
          <h2 class="section-title">Прогресс</h2>
          <div id="chart"></div>
          <ul id="history" class="history"></ul>
        </div>

      </div>
    </section>

    <!-- Экран: добавление упражнения -->
    <section id="screen-add" class="screen right">
      <header class="topbar">
        <button class="btn-icon btn-back" aria-label="Назад">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
        <h1 id="add-title" class="topbar-title">Новое упражнение</h1>
        <span class="btn-icon"></span>
      </header>

      <div class="add-body">
        <div class="field" id="field-presets">
          <span class="field-label">Быстрый выбор</span>
          <div id="preset-row" class="preset-row"></div>
        </div>

        <label class="field">
          <span class="field-label">Название</span>
          <input id="inp-name" type="text" maxlength="40" placeholder="Например, жим ногами">
        </label>

        <label class="field">
          <span class="field-label">Группа <span class="label-opt">необязательно</span></span>
          <select id="sel-group"></select>
        </label>

        <label class="field" id="field-new-group" hidden>
          <span class="field-label">Название группы</span>
          <input id="inp-group" type="text" maxlength="30" placeholder="Например, спина">
        </label>

        <div class="field">
          <span class="field-label">Цвет карточки</span>
          <div id="color-picker" class="color-picker"></div>
        </div>

        <div class="field">
          <span class="field-label">Снаряд</span>
          <div id="type-picker" class="type-picker"></div>
        </div>

        <label class="field" id="field-step">
          <span class="field-label">Шаг веса, кг</span>
          <input id="inp-step" type="number" inputmode="decimal" min="0.5" step="0.5" value="2.5">
        </label>

        <label class="field" id="field-bar">
          <span class="field-label">Вес грифа, кг</span>
          <input id="inp-bar" type="number" inputmode="decimal" min="0" step="0.5" value="20">
        </label>

        <button id="btn-create" class="btn-primary">Добавить упражнение</button>
      </div>
    </section>

    <!-- Экран: настройки -->
    <section id="screen-settings" class="screen right">
      <header class="topbar">
        <button class="btn-icon btn-back" aria-label="Назад">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
        <h1 class="topbar-title">Настройки</h1>
        <span class="btn-icon"></span>
      </header>

      <div class="settings-body">
        <div class="field">
          <span class="field-label">Память истории</span>
          <div class="mem-card">
            <div class="mem-bar"><div id="mem-fill"></div></div>
            <div id="mem-text" class="mem-text">—</div>
          </div>
        </div>

        <div class="field">
          <span class="field-label">Данные</span>
          <button id="btn-export" class="settings-row">
            Скопировать данные <span class="row-hint">резервная копия в JSON</span>
          </button>
          <label class="settings-row">
            <span>Вибрация</span>
            <input id="tgl-haptics" class="switch" type="checkbox" checked>
          </label>
        </div>

        <div class="field">
          <span class="field-label">Очистка</span>
          <button id="btn-clear-old" class="settings-row">
            Очистить старые записи <span class="row-hint">оставить 20 последних</span>
          </button>
          <button id="btn-reset-progress" class="settings-row danger">
            Сбросить прогресс <span class="row-hint">упражнения останутся</span>
          </button>
          <button id="btn-reset-all" class="settings-row danger">Сбросить всё</button>
        </div>

        <div id="about-line" class="about"></div>
      </div>
    </section>

    <div id="sheet-backdrop" class="sheet-backdrop" hidden>
      <div id="sheet" class="sheet" role="menu"></div>
    </div>

    <div id="toast" class="toast" hidden></div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/viz.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
